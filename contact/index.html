<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Jain</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 90%;
  max-width: 360px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 30px 20px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.logo {
  width: 70px;
  margin-bottom: 15px;
}

h2 {
  margin: 10px 0 5px;
  font-weight: 600;
}

p {
  color: #94a3b8;
  margin-bottom: 25px;
}

.btn {
  display: block;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
}

.save {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: black;
  font-weight: 700;
}

.save:hover {
  transform: scale(1.05);
}

.call {
  background: rgba(59,130,246,0.15);
  border: 1px solid #3b82f6;
}

.wa {
  background: rgba(34,197,94,0.15);
  border: 1px solid #22c55e;
}

.web {
  background: rgba(245,158,11,0.15);
  border: 1px solid #f59e0b;
}

.btn:hover {
  transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="card">

  <!-- OPTIONAL LOGO -->
  <!-- Replace src with your logo -->
  <img src="https://via.placeholder.com/80" class="logo">

  <h2>Aditya Jain</h2>
  <p>Yodha FRP Manhole Covers</p>

  <a class="btn save" href="/contact/contact.vcf">💾 Save Contact</a>
  <a class="btn call" href="tel:+917888490558">📞 Call</a>
  <a class="btn wa" href="https://wa.me/917888490558">💬 WhatsApp</a>
  <a class="btn web" href="https://yodhafrp.in">🌐 Website</a>

</div>

</body>
</html>
