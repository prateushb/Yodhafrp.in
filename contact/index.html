<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Jain</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0b1220;
  color: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 90%;
  max-width: 360px;
  background: #111827;
  border-radius: 18px;
  padding: 30px 20px;
  text-align: center;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.05);
}

/* LOGO */
.logo {
  width: 85px;
  height: 85px;
  object-fit: contain;
  margin-bottom: 15px;
  border-radius: 50%;
  background: #ffffff;
  padding: 6px;
}

/* TEXT */
h2 {
  margin: 10px 0 5px;
  font-weight: 600;
  font-size: 20px;
  color: #ffffff;
}

p {
  color: #9ca3af;
  font-size: 14px;
  margin-bottom: 25px;
  letter-spacing: 0.3px;
}

/* BUTTONS */
.btn {
  display: block;
  padding: 13px;
  margin: 10px 0;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 500;
  font-size: 15px;
  transition: 0.25s;
}

/* Primary Button */
.save {
  background: #f97316;
  color: white;
  font-weight: 600;
}

/* Secondary Buttons */
.call, .wa, .web {
  background: transparent;
  border: 1px solid #374151;
  color: #d1d5db;
}

.btn:hover {
  background: #1f2937;
}

.save:hover {
  background: #ea580c;
}

</style>
</head>

<body>

<div class="card">

  <!-- YOUR LOGO -->
  <img src="logo.png" class="logo">

  <h2>Aditya Jain</h2>
  <p>Yodha FRP Manhole Covers</p>

  <a class="btn save" href="/contact/contact.vcf">Save Contact</a>
  <a class="btn call" href="tel:+917888490558">Call</a>
  <a class="btn wa" href="https://wa.me/917888490558">WhatsApp</a>
  <a class="btn web" href="https://yodhafrp.in">Website</a>

</div>

</body>
</html>
